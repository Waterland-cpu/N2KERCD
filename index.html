<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N2K ERCD</title>
    <style>
       /* 🎯 這裡已經幫你換上支援 .jpeg 的滿版背景設定 */
        body { 
            font-family: Arial, sans-serif; 
            background-image: url('images/image999.jpeg'); /* 💡 請記得把這裡改成你實際的 .jpeg 檔名 */
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0; 
            padding: 20px; 
        }
        .container { 
            max-width: 1100px; 
            margin: auto; 
            
            /* 🎯 核心密技 1：將 background: white 改為 80% 的半透明白底，讓背景圖透出來 */
            background: rgba(255, 255, 255, 0.8); 
            
            /* 🎯 核心密技 2：加入毛玻璃模糊特效，後方的風景圖會自動霧化，文字會超級清晰好讀 */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); /* 確保 iPhone/Safari 瀏覽器也能完美呈現 */
            
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); 
        }
        
        h1 { color: #0056b3; text-align: center; }
        #search { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; box-sizing: border-box; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        
        th:nth-child(1), td:nth-child(1) { width: 3%; text-align: center; }  
        th:nth-child(2), td:nth-child(2) { width: 25%; }                     
        th:nth-child(3), td:nth-child(3) { width: 50%; }                     
        th:nth-child(4), td:nth-child(4) { width: 22%; text-align: center; } 

        th { background-color: #0056b3; color: white; padding: 12px; text-align: left; font-size: 15px; }

        td { 
            padding: 12px; 
            border-bottom: 1px solid #ddd; 
            vertical-align: top; 
            text-align: left;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-line !important; 
            word-break: break-word;
        }

        .multi-image-container { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }

        #tableBody td img {
            width: 150px;            
            height: 150px;           
            object-fit: cover;      
            border-radius: 6px; 
            border: 1px solid #ccc;
            cursor: pointer;
            transition: transform 0.2s ease-in-out; 
        }

        #tableBody td img:hover {
            transform: scale(2.8);  
            position: relative;
            z-index: 999;           
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); 
            border-color: #0056b3;
        }

        @media screen and (max-width: 600px) {
            table { table-layout: fixed !important; width: 100% !important; }
            th:nth-child(1), td:nth-child(1) { width: 5% !important; }
            th:nth-child(2), td:nth-child(2) { width: 25% !important; }
            th:nth-child(3), td:nth-child(3) { width: 45% !important; }
            th:nth-child(4), td:nth-child(4) { width: 25% !important; }
            th, td { padding: 6px 4px !important; font-size: 11px !important; }
            #tableBody td img { width: 50px !important; height: 50px !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>N2K ERCD</h1>
    <input type="text" id="search" placeholder="輸入關鍵字尋找錯誤碼或處置方法...">

    <table id="errorTable">
        <thead>
            <tr>
                <th>編號</th>
                <th>錯誤碼</th>
                <th>建議處置 (Solution)</th>
                <th>參考圖片</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script src="data.js"></script>

<script>
    const searchInput = document.getElementById('search');
    const tableBody = document.getElementById('tableBody');

    // 🌟 超強大自動抓取圖片路徑演算法 (防堵空格、大小寫、欄位變動)
    function findImagePath(item) {
        let potentialPath = "";

        // 1. 先嘗試找出所有物件中的 Key
        for (let key in item) {
            let cleanKey = key.toLowerCase().replace(/\s+/g, ''); // 把所有空格移掉、變小寫
            let value = String(item[key]).trim();

            // 如果值本身就是 NaN 或是空的，直接跳過
            if (value === "NaN" || value === "undefined" || value === "null" || value === "") {
                continue;
            }

            // 2. 如果欄位名稱叫 image 或 unnamed
            if (cleanKey.includes('image') || cleanKey.includes('unnamed')) {
                // 如果內容包含特定的圖片路徑格式
                if (value.includes('images/') || value.toLowerCase().includes('.png') || value.toLowerCase().includes('.jpg')) {
                    return value; // 找到了，直接收工！
                }
                // 備用：如果欄位叫做 unnamed 且裡面確實有值，先記錄起來
                if (cleanKey.includes('unnamed3') || cleanKey.includes('image')) {
                    potentialPath = value;
                }
            }
        }
        return potentialPath;
    }

    function renderTable(filterText = "") {
        tableBody.innerHTML = ""; 

        if (typeof errorData === 'undefined') {
            tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:red; font-weight:bold;">❌ 無法讀取 data.js 資料，請檢查檔案第 21 行左右的 NaN 是否未加引號。</td></tr>';
            return;
        }

        const filteredData = errorData.filter(item => {
            const col1 = String(item['Error message'] || "").toLowerCase();
            const col2 = String(item['Solution'] || item['Unnamed: 1'] || "").toLowerCase();
            
            return col1.includes(filterText.toLowerCase()) || col2.includes(filterText.toLowerCase());
        });

        filteredData.forEach((item, index) => {
            let errorMsg = item['Error message'] || "-";
            let solution = item['Solution'] || item['Unnamed: 1'] || "-"; 
            
            // 🎯 使用最新的模糊比對演算法抓圖片
            let imagePath = findImagePath(item); 
            let imageHtml = "-";

            // 關鍵字高亮
            const colorRules = [
                { word: "Egr", color: "red" },
                { word: "SYS_Chk", color: "green" },
                { word: "Power cycle", color: "orange" }
            ];

            colorRules.forEach(rule => {
                const regex = new RegExp(rule.word, "gi");
                solution = solution.replace(regex, `<span style="color:${rule.color}; font-weight:bold;">$&</span>`);
            });

            // 圖片渲染邏輯
            if (imagePath && imagePath !== "-" && imagePath !== "NaN") {
                if (imagePath.includes("<img")) {
                    imageHtml = `<div class="multi-image-container">${imagePath}</div>`;
                } else {
                    imageHtml = `
                        <a href="${imagePath}" target="_blank" onclick="event.preventDefault();">
                            <img src="${imagePath}" 
                                 alt="參考圖片"
                                 onerror="this.onerror=null; this.src='https://placehold.co/90x90?text=No+Image';">
                        </a>`;
                }
            } else {
                imageHtml = "<span style='color:#ccc;'>無圖片</span>";
            }

            const row = `
                <tr>
                    <td style="text-align:center; font-weight:bold; color:#666">${index + 1}</td>
                    <td><strong>${errorMsg}</strong></td>
                    <td>${solution}</td> 
                    <td>${imageHtml}</td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });

        if (filteredData.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">找不到符合的資料</td></tr>';
        }
    }

    searchInput.addEventListener('input', (e) => renderTable(e.target.value));
    
    window.onload = function() {
        const CORRECT_PASSWORD = "prisma"; 
        let userPassword = prompt("請輸入訪問密碼 (Please enter password)：");
        
        if (userPassword === CORRECT_PASSWORD) {
            alert("驗證成功！歡迎使用。");
            renderTable();
            
            // 點擊小圖開原始大圖
            document.getElementById('tableBody').addEventListener('click', function(e) {
                if (e.target.tagName === 'IMG') {
                    const imageUrl = e.target.src;
                    if (imageUrl && !imageUrl.includes('placehold.co')) {
                        window.open(imageUrl, '_blank');
                    }
                }
            });
        } else {
            alert("密碼錯誤，拒絕訪問！");
            document.body.innerHTML = `
                <div style="text-align:center; margin-top:100px; color:#ff4d4f;">
                    <h2>🔒 存取遭拒 (Access Denied)</h2>
                    <p>密碼錯誤，請重新整理網頁再試一次。</p>
                </div>`;
        }
    };
</script>

</body>
</html>
